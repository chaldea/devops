version: '3.5'
 
services:
  syncsvr:
    container_name: syncsvr
    image: docker.flexem.com/flexem-fbox/fbox.syncsvr:1.0.0.5431-c8e79a
    ports:
     - "20021:20021"
    restart: always
    environment:
      Kafka__BootstrapServers: kafka:9092
      Kafka__TopicPrefix: fboxlocal.
      Redis__EndPoints: redis:6379
      Redis__Database: 1

networks:
  default:
    external: true
    name: cluster